<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON项目管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #ff9e00;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --border-radius: 12px;
            --shadow: 0 10px 20px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7ff 0%, #e9ecef 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 登录界面样式 */
        .login-container {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
            transition: var(--transition);
        }

        .login-container.hidden {
            opacity: 0;
            transform: translateY(-20px);
            display: none;
        }

        .login-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .login-subtitle {
            color: var(--gray);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5ee;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-block {
            width: 100%;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: #e01e6c;
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            background: #3ab3d9;
        }

        /* 管理界面样式 */
        .admin-container {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }

        .admin-container.active {
            opacity: 1;
            transform: translateY(0);
        }

        .admin-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
        }

        .admin-body {
            padding: 30px;
        }

        .tabs {
            display: flex;
            background: var(--light);
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .tab-button {
            flex: 1;
            background: none;
            border: none;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-button:hover {
            background: rgba(67, 97, 238, 0.05);
            color: var(--primary);
        }

        .tab-button.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .projects-list {
            margin-bottom: 25px;
        }

        .project-item {
            background: white;
            border: 1px solid #eef2ff;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .project-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .project-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .project-details h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: var(--dark);
        }

        .project-details p {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .project-actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light);
            color: var(--gray);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
        }

        .btn-icon.edit:hover {
            background: var(--success);
        }

        .btn-icon.delete:hover {
            background: var(--danger);
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
        }

        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag {
            background-color: #eef2ff;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tag .remove-tag {
            cursor: pointer;
            font-size: 0.7rem;
        }

        .add-tag-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-tag-input input {
            flex: 1;
        }

        /* 通知样式 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            max-width: 350px;
            transform: translateX(400px);
            transition: var(--transition);
            z-index: 1000;
        }

        .notification.active {
            transform: translateX(0);
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }

        .notification.success .notification-icon {
            background: var(--success);
        }

        .notification.error .notification-icon {
            background: var(--danger);
        }

        .notification.warning .notification-icon {
            background: var(--warning);
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .notification-message {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .close-notification {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--gray);
            cursor: pointer;
            transition: var(--transition);
        }

        .close-notification:hover {
            color: var(--dark);
        }

        /* 模态框样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 500px;
            transform: translateY(-20px);
            transition: var(--transition);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid #eef2ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--dark);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--gray);
            cursor: pointer;
            transition: var(--transition);
        }

        .close-modal:hover {
            color: var(--dark);
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            padding: 15px 25px;
            border-top: 1px solid #eef2ff;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 空状态样式 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #dee2e6;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .admin-actions {
                width: 100%;
                justify-content: space-between;
            }

            .form-row {
                flex-direction: column;
                gap: 15px;
            }

            .project-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .project-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .admin-body {
                padding: 20px;
            }

            .tabs {
                flex-direction: column;
            }

            .notification {
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录界面 -->
        <div class="login-container" id="loginContainer">
            <div class="login-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="login-title">项目管理后台</h1>
            <p class="login-subtitle">请输入密码访问管理界面</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入管理密码" required>
                </div>
                <button type="submit" class="btn btn-block">验证密码</button>
            </form>
        </div>

        <!-- 管理界面 -->
        <div class="admin-container" id="adminContainer">
            <div class="admin-header">
                <h1 class="admin-title">项目管理后台</h1>
                <div class="admin-actions">
                    <button class="btn" id="addProjectBtn">
                        <i class="fas fa-plus"></i> 添加项目
                    </button>
                    <button class="btn btn-success" id="saveDataBtn">
                        <i class="fas fa-save"></i> 保存数据
                    </button>
                    <button class="btn btn-danger" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> 退出
                    </button>
                </div>
            </div>

            <div class="admin-body">
                <div class="tabs">
                    <button class="tab-button active" data-tab="public">
                        <i class="fas fa-globe"></i>
                        公共项目
                    </button>
                    <button class="tab-button" data-tab="personal">
                        <i class="fas fa-user"></i>
                        我的项目
                    </button>
                </div>

                <div class="tab-content active" id="public-tab">
                    <div class="projects-list" id="public-projects-list">
                        <!-- 公共项目列表将通过JS动态生成 -->
                    </div>
                </div>

                <div class="tab-content" id="personal-tab">
                    <div class="projects-list" id="personal-projects-list">
                        <!-- 我的项目列表将通过JS动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知组件 -->
    <div class="notification" id="notification">
        <div class="notification-icon">
            <i class="fas fa-check"></i>
        </div>
        <div class="notification-content">
            <div class="notification-title" id="notificationTitle">操作成功</div>
            <div class="notification-message" id="notificationMessage">您的操作已成功完成</div>
        </div>
        <button class="close-notification" id="closeNotification">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <!-- 项目编辑模态框 -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">添加项目</h2>
                <button class="close-modal" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="projectId">
                    <input type="hidden" id="projectType">

                    <div class="form-group">
                        <label for="projectName">项目名称</label>
                        <input type="text" id="projectName" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="projectDescription">项目描述</label>
                        <textarea id="projectDescription" class="form-control" rows="3" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="projectIcon">项目图标</label>
                        <select id="projectIcon" class="form-control" required>
                            <option value="fas fa-palette">🎨 设计</option>
                            <option value="fas fa-book">📚 文档</option>
                            <option value="fas fa-users">👥 团队</option>
                            <option value="fas fa-code-branch">🔓 开源</option>
                            <option value="fas fa-code">🔌 开发</option>
                            <option value="fas fa-mobile-alt">📱 产品</option>
                            <option value="fas fa-desktop">💼 工作台</option>
                            <option value="fas fa-tasks">📊 任务</option>
                            <option value="fas fa-sticky-note">📝 笔记</option>
                            <option value="fas fa-bookmark">⭐ 收藏</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="projectLink">项目链接</label>
                        <input type="url" id="projectLink" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>项目标签</label>
                        <div class="tags-input" id="tagsContainer">
                            <!-- 标签将通过JS动态生成 -->
                        </div>
                        <div class="add-tag-input">
                            <input type="text" id="newTag" class="form-control" placeholder="输入新标签">
                            <button type="button" class="btn" id="addTagBtn">添加</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="projectDate">创建日期</label>
                        <input type="date" id="projectDate" class="form-control" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" id="cancelProjectBtn">取消</button>
                <button class="btn btn-success" id="saveProjectBtn">保存项目</button>
            </div>
        </div>
    </div>

    <script>
        // 密码验证和管理功能
        document.addEventListener('DOMContentLoaded', async function () {
            // 元素引用
            const loginContainer = document.getElementById('loginContainer');
            const adminContainer = document.getElementById('adminContainer');
            const loginForm = document.getElementById('loginForm');
            const logoutBtn = document.getElementById('logoutBtn');
            const notification = document.getElementById('notification');
            const closeNotification = document.getElementById('closeNotification');
            const projectModal = document.getElementById('projectModal');
            const closeModal = document.getElementById('closeModal');
            const cancelProjectBtn = document.getElementById('cancelProjectBtn');
            const addProjectBtn = document.getElementById('addProjectBtn');
            const saveProjectBtn = document.getElementById('saveProjectBtn');
            const saveDataBtn = document.getElementById('saveDataBtn');
            const projectForm = document.getElementById('projectForm');
            const addTagBtn = document.getElementById('addTagBtn');
            const tagsContainer = document.getElementById('tagsContainer');
            const newTagInput = document.getElementById('newTag');
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');

            // 项目数据
            let projectsData = {
                public: [],
                personal: []
            };

            // 当前编辑的项目
            let currentEditingProject = null;

            // 密码验证
            // 从外部JSON文件获取密码
            const response = await fetch('projects.json');
            const config = await response.json();
            const PASSWORD = config.password;

            // 初始化
            function init() {
                // 尝试从localStorage加载数据
                const savedData = localStorage.getItem('projectsData');
                if (savedData) {
                    projectsData = JSON.parse(savedData);
                } else {
                    // 使用默认数据
                    projectsData = getDefaultData();
                }

                // 渲染项目列表
                renderProjects('public');
                renderProjects('personal');

                // 设置当前日期为默认值
                document.getElementById('projectDate').valueAsDate = new Date();
            }

            // 获取默认数据
            function getDefaultData() {
                return {
                    "public": [
                        {
                            "id": 1,
                            "name": "设计资源库",
                            "description": "汇集优秀设计资源和模板，提升设计效率",
                            "icon": "fas fa-palette",
                            "link": "#",
                            "tags": ["设计", "资源", "模板"],
                            "date": "2023-10-15"
                        },
                        {
                            "id": 2,
                            "name": "开发文档中心",
                            "description": "前端、后端开发技术文档和最佳实践指南",
                            "icon": "fas fa-book",
                            "link": "#",
                            "tags": ["文档", "开发", "技术"],
                            "date": "2023-09-28"
                        }
                    ],
                    "personal": [
                        {
                            "id": 1,
                            "name": "个人工作台",
                            "description": "个性化工作空间，快速访问常用工具和资源",
                            "icon": "fas fa-desktop",
                            "link": "#",
                            "tags": ["工作", "个人", "工具"],
                            "date": "2023-11-20"
                        }
                    ]
                };
            }

            // 渲染项目列表
            function renderProjects(type) {
                const container = document.getElementById(`${type}-projects-list`);
                const projects = projectsData[type];

                if (projects.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h3>暂无项目</h3>
                            <p>当前没有${type === 'public' ? '公共' : '个人'}项目</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                projects.forEach(project => {
                    html += `
                        <div class="project-item" data-id="${project.id}">
                            <div class="project-info">
                                <div class="project-icon">
                                    <i class="${project.icon}"></i>
                                </div>
                                <div class="project-details">
                                    <h3>${project.name}</h3>
                                    <p>${project.description}</p>
                                </div>
                            </div>
                            <div class="project-actions">
                                <button class="btn-icon edit" data-type="${type}" data-id="${project.id}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-icon delete" data-type="${type}" data-id="${project.id}">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

                // 添加编辑和删除事件监听
                container.querySelectorAll('.btn-icon.edit').forEach(btn => {
                    btn.addEventListener('click', function () {
                        const type = this.getAttribute('data-type');
                        const id = parseInt(this.getAttribute('data-id'));
                        editProject(type, id);
                    });
                });

                container.querySelectorAll('.btn-icon.delete').forEach(btn => {
                    btn.addEventListener('click', function () {
                        const type = this.getAttribute('data-type');
                        const id = parseInt(this.getAttribute('data-id'));
                        deleteProject(type, id);
                    });
                });
            }

            // 显示通知
            function showNotification(title, message, type = 'success') {
                const notification = document.getElementById('notification');
                const notificationTitle = document.getElementById('notificationTitle');
                const notificationMessage = document.getElementById('notificationMessage');
                const notificationIcon = notification.querySelector('.notification-icon i');

                // 设置通知内容和样式
                notificationTitle.textContent = title;
                notificationMessage.textContent = message;
                notification.className = `notification ${type}`;

                // 更新图标
                if (type === 'success') {
                    notificationIcon.className = 'fas fa-check';
                } else if (type === 'error') {
                    notificationIcon.className = 'fas fa-exclamation-triangle';
                } else if (type === 'warning') {
                    notificationIcon.className = 'fas fa-exclamation-circle';
                }

                // 显示通知
                notification.classList.add('active');

                // 3秒后自动隐藏
                setTimeout(() => {
                    notification.classList.remove('active');
                }, 3000);
            }

            // 显示项目模态框
            function showProjectModal(title, type = 'public') {
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('projectType').value = type;
                projectModal.classList.add('active');
            }

            // 隐藏项目模态框
            function hideProjectModal() {
                projectModal.classList.remove('active');
                projectForm.reset();
                tagsContainer.innerHTML = '';
                currentEditingProject = null;
            }

            // 添加项目
            function addProject(type) {
                showProjectModal('添加项目', type);
            }

            // 编辑项目
            function editProject(type, id) {
                const project = projectsData[type].find(p => p.id === id);
                if (!project) return;

                currentEditingProject = {type, id};

                // 填充表单
                document.getElementById('projectId').value = id;
                document.getElementById('projectType').value = type;
                document.getElementById('projectName').value = project.name;
                document.getElementById('projectDescription').value = project.description;
                document.getElementById('projectIcon').value = project.icon;
                document.getElementById('projectLink').value = project.link;
                document.getElementById('projectDate').value = project.date;

                // 填充标签
                tagsContainer.innerHTML = '';
                project.tags.forEach(tag => {
                    addTagToContainer(tag);
                });

                showProjectModal('编辑项目', type);
            }

            // 删除项目
            function deleteProject(type, id) {
                if (confirm('确定要删除这个项目吗？此操作不可撤销。')) {
                    projectsData[type] = projectsData[type].filter(p => p.id !== id);
                    renderProjects(type);
                    showNotification('删除成功', '项目已成功删除', 'success');
                }
            }

            // 保存项目
            function saveProject() {
                const id = document.getElementById('projectId').value;
                const type = document.getElementById('projectType').value;
                const name = document.getElementById('projectName').value;
                const description = document.getElementById('projectDescription').value;
                const icon = document.getElementById('projectIcon').value;
                const link = document.getElementById('projectLink').value;
                const date = document.getElementById('projectDate').value;

                // 收集标签
                const tags = Array.from(tagsContainer.querySelectorAll('.tag .tag-text'))
                    .map(el => el.textContent);

                if (!name || !description || !link) {
                    showNotification('表单错误', '请填写所有必填字段', 'error');
                    return;
                }

                const projectData = {
                    id: id ? parseInt(id) : generateId(type),
                    name,
                    description,
                    icon,
                    link,
                    tags,
                    date
                };

                if (currentEditingProject) {
                    // 更新现有项目
                    const index = projectsData[type].findIndex(p => p.id === parseInt(id));
                    if (index !== -1) {
                        projectsData[type][index] = projectData;
                    }
                    showNotification('更新成功', '项目已成功更新', 'success');
                } else {
                    // 添加新项目
                    projectsData[type].push(projectData);
                    showNotification('添加成功', '新项目已成功添加', 'success');
                }

                renderProjects(type);
                hideProjectModal();
            }

            // 生成新ID
            function generateId(type) {
                const ids = projectsData[type].map(p => p.id);
                return ids.length > 0 ? Math.max(...ids) + 1 : 1;
            }

            // 添加标签到容器
            function addTagToContainer(tagText) {
                if (!tagText.trim()) return;

                const tagElement = document.createElement('div');
                tagElement.className = 'tag';
                tagElement.innerHTML = `
                    <span class="tag-text">${tagText}</span>
                    <span class="remove-tag"><i class="fas fa-times"></i></span>
                `;

                // 添加删除标签事件
                tagElement.querySelector('.remove-tag').addEventListener('click', function () {
                    tagElement.remove();
                });

                tagsContainer.appendChild(tagElement);
            }

            // 保存数据到localStorage
            function saveData() {
                localStorage.setItem('projectsData', JSON.stringify(projectsData));
                showNotification('保存成功', '项目数据已成功保存', 'success');
            }

            // 事件监听

            // 登录表单提交
            loginForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const password = document.getElementById('password').value;

                if (password === PASSWORD) {
                    loginContainer.classList.add('hidden');
                    setTimeout(() => {
                        adminContainer.classList.add('active');
                        init();
                    }, 300);
                    showNotification('登录成功', '欢迎来到项目管理后台', 'success');
                } else {
                    showNotification('密码错误', '请输入正确的管理密码', 'error');
                }
            });

            // 退出登录
            logoutBtn.addEventListener('click', function () {
                adminContainer.classList.remove('active');
                setTimeout(() => {
                    loginContainer.classList.remove('hidden');
                    document.getElementById('password').value = '';
                }, 300);
                showNotification('已退出', '您已成功退出管理后台', 'warning');
            });

            // 关闭通知
            closeNotification.addEventListener('click', function () {
                notification.classList.remove('active');
            });

            // 关闭模态框
            closeModal.addEventListener('click', hideProjectModal);
            cancelProjectBtn.addEventListener('click', hideProjectModal);

            // 添加项目按钮
            addProjectBtn.addEventListener('click', function () {
                const activeTab = document.querySelector('.tab-button.active').getAttribute('data-tab');
                addProject(activeTab);
            });

            // 保存项目按钮
            saveProjectBtn.addEventListener('click', saveProject);

            // 保存数据按钮
            saveDataBtn.addEventListener('click', saveData);

            // 添加标签按钮
            addTagBtn.addEventListener('click', function () {
                const tagText = newTagInput.value.trim();
                if (tagText) {
                    addTagToContainer(tagText);
                    newTagInput.value = '';
                }
            });

            // 标签输入框回车事件
            newTagInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addTagBtn.click();
                }
            });

            // 标签页切换
            tabButtons.forEach(button => {
                button.addEventListener('click', function () {
                    const tabId = this.getAttribute('data-tab');

                    // 更新活动标签按钮
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');

                    // 显示对应标签内容
                    tabContents.forEach(content => {
                        content.classList.remove('active');
                        if (content.id === `${tabId}-tab`) {
                            content.classList.add('active');
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
