<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 皓之羽 | 成绩管理与分析</title>
    <link rel="icon" type="image/png" href="/imgs/logo.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- API Service -->
    <script src="js/api.js"></script>
    <!-- Script Service -->
    <script src="js/script.js"></script>
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary-color)',
                        'primary-dark': 'var(--primary-dark)',
                        'primary-light': 'var(--primary-light)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <!-- 登录卡片 -->
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full">
        <!-- Logo和标题 -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-graduation-cap text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">皓之羽 | 成绩管理与分析</h1>
            <p class="text-gray-500 mt-2">请登录您的账户</p>
        </div>
        
        <!-- 登录表单 -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">用户名</label>
                <div class="mt-1 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="username" name="username" required
                        class="pl-10 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                </div>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">密码</label>
                <div class="mt-1 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" name="password" required
                        class="pl-10 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                        <button type="button" id="togglePassword" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 错误信息显示 -->
            <div id="loginError" class="hidden text-red-500 text-sm"></div>
            
            <div>
                <button type="submit" id="loginBtn"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200">
                    <i class="fas fa-sign-in-alt mr-2"></i>登录
                </button>
            </div>
        </form>
        
        <!-- 访客登录选项 -->
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">或</p>
            <button id="guestLoginBtn"
                class="mt-2 text-sm text-primary hover:text-primary-dark font-medium">
                <i class="fas fa-user-secret mr-1"></i>访客模式
            </button>
        </div>
    </div>
    
    <!-- 脚本 -->
    <script>
        // 切换密码可见性
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('password');
        
        togglePassword.addEventListener('click', () => {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            togglePassword.querySelector('i').classList.toggle('fa-eye');
            togglePassword.querySelector('i').classList.toggle('fa-eye-slash');
        });
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginError = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');
            
            // 重置错误信息
            loginError.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>登录中...';
            
            try {
                // 调用登录API
                const result = await apiService.login(username, password);
                
                if (result && result.success) {
          // 保存用户信息到本地存储
          Storage.saveUser(result.user);
          Storage.setLoggedIn(true);
                    
                    // 同步数据
                    await apiService.syncDatabaseToLocal();
                    
                    // 数据库同步后，强制用登录信息覆盖localStorage中的个人信息
                    const currentProfile = Storage.getProfile();
                    const updatedProfile = {
                        ...currentProfile,
                        name: result.user.username,
                        className: result.user.class || '',
                        school: result.user.school || ''
                    };
                    Storage.saveProfile(updatedProfile);
                    
                    // 跳转到主页
                    window.location.href = 'index.html';
                } else {
                    loginError.textContent = result?.message || '登录失败，请检查网络连接或联系管理员';
                    loginError.classList.remove('hidden');
                }
            } catch (error) {
                console.error('登录失败:', error);
                loginError.textContent = '登录失败，请稍后重试';
                loginError.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>登录';
            }
        });
        
        // 访客登录
        document.getElementById('guestLoginBtn').addEventListener('click', () => {
            // 清除用户信息
            Storage.setLoggedIn(false);
            Storage.removeUser();
            
            // 跳转到主页
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
