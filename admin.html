<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统</title>
    <link rel="icon" type="image/png" href="/imgs/logo.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- API Service -->
    <script src="js/api.js"></script>
    <!-- Script Service -->
    <script src="js/script.js"></script>
    <style>
        /* 基础样式 */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        /* 容器样式 */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 表格容器样式 */
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .table-container:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        /* 登录容器样式 */
        .login-container {
            max-width: 450px;
            margin: 100px auto;
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        
        .login-container:hover {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        /* 按钮样式 */
        .btn {
            transition: all 0.2s ease;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        /* 导航按钮样式 */
        .nav-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #4f46e5;
            transition: width 0.3s ease;
        }
        
        .nav-btn:hover {
            background-color: #f8fafc;
            transform: translateX(4px);
        }
        
        .nav-btn:hover::after {
            width: 100%;
        }
        
        .nav-btn.active {
            background-color: #e0e7ff;
            color: #4f46e5;
            font-weight: 600;
        }
        
        .nav-btn.active::after {
            width: 100%;
        }
        
        /* 输入框样式 */
        input:focus, select:focus, textarea:focus {
            transition: all 0.2s ease;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        /* 模态框样式 */
        .modal {
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            animation: slideIn 0.3s ease;
            transition: all 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* 数据表格样式 */
        #dataTable {
            border-collapse: separate;
            border-spacing: 0;
        }
        
        #dataTable tbody tr {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        #dataTable tbody tr:hover {
            background-color: #f8fafc;
            transform: translateX(2px);
        }
        
        #dataTable tbody tr td {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        #dataTable tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* 数据表格操作按钮 */
        .table-actions .btn {
            font-size: 0.875rem;
            padding: 0.375rem 0.75rem;
            margin: 0 0.125rem;
            transition: all 0.2s ease;
        }
        
        .table-actions .btn:hover {
            transform: translateY(-1px);
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { 
                transform: rotate(360deg); 
            }
        }
        
        /* 全局加载指示器 - 右上角小加载圈 */
        #globalLoading {
            position: fixed;
            top: 1rem;
            right: -3rem; /* 初始位置在屏幕外 */
            width: 2.5rem;
            height: 2.5rem;
            background-color: rgba(99, 102, 241, 0.9);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #globalLoading:not(.hidden) {
            right: 1rem; /* 显示时移动到右上角 */
        }
        
        #globalLoading .spinner {
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        /* 状态标签样式 */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .status-active {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .status-inactive {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .status-pending {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        /* 工具提示 */
        .tooltip {
            position: relative;
            display: inline-block;
        }
        
        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            white-space: nowrap;
            z-index: 10;
            margin-bottom: 0.5rem;
            opacity: 1;
            transition: opacity 0.2s ease;
        }
        
        /* 淡入动画 */
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out;
        }
        
        /* 滑动动画 */
        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }
        
        /* 脉冲动画 */
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        /* 悬停效果 */
        .hover-lift {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        /* 渐变背景 */
        .bg-gradient-indigo {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        
        /* 按钮组样式 */
        .btn-group .btn {
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .admin-container {
                padding: 10px;
            }
            
            .login-container {
                padding: 30px 20px;
                margin: 50px auto;
            }
            
            .table-container {
                overflow-x: auto;
            }
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
        
        /* 表单标签样式 */
        label {
            transition: all 0.2s ease;
        }
        
        /* 页脚样式 */
        footer {
            margin-top: 2rem;
            padding: 1rem;
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
        }
        
        /* 分隔线样式 */
        hr {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0));
            margin: 1.5rem 0;
        }
        
        /* 标题样式 */
        h1, h2, h3, h4, h5, h6 {
            margin-top: 0;
            margin-bottom: 1rem;
            font-weight: 600;
            line-height: 1.25;
        }
        
        /* 文本颜色 */
        .text-gray-600 {
            color: #4b5563;
        }
        
        /* 卡片头部样式 */
        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #e5e7eb;
            background-color: #f9fafb;
            border-radius: 12px 12px 0 0;
        }
        
        /* 卡片内容样式 */
        .card-body {
            padding: 1.25rem;
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginSection" class="login-container">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="bg-indigo-100 p-3 rounded-full">
                    <i class="fas fa-shield-alt text-indigo-600 text-4xl"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">后台管理系统</h1>
            <p class="text-gray-500 mt-2">请登录您的账户以继续</p>
        </div>
        <div id="adminLoginError" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-6 hidden animate-fadeIn">
            <div class="flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span class="block sm:inline"></span>
            </div>
        </div>
        <form id="adminLoginForm" class="space-y-5">
            <div>
                <label for="adminUsername" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="adminUsername" name="username" class="pl-10 mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm transition-all" required placeholder="请输入用户名">
                </div>
            </div>
            <div>
                <label for="adminPassword" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="adminPassword" name="password" class="pl-10 mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm transition-all" required placeholder="请输入密码">
                </div>
            </div>
            <div>
                <button type="submit" id="adminLoginBtn" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 btn transition-all">
                    <i class="fas fa-sign-in-alt mr-2"></i> 登录
                </button>
            </div>
        </form>
        <div class="text-center mt-6">
            <p class="text-sm text-gray-500">© 2024 后台管理系统</p>
        </div>
    </div>

    <!-- 管理界面 -->
    <div id="adminSection" class="hidden">
        <div class="admin-container">
            <!-- 顶部导航 -->
            <div class="bg-white rounded-xl shadow-lg p-5 mb-6 flex justify-between items-center transition-all">
                <div class="flex items-center space-x-2">
                    <div class="bg-indigo-100 p-2 rounded-lg">
                        <i class="fas fa-database text-indigo-600 text-xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800">数据库管理系统</h1>
                </div>
                <div class="flex items-center space-x-5">
                    <div class="bg-gray-50 px-4 py-2 rounded-lg border border-gray-200">
                        <span id="currentUser" class="text-gray-700 font-medium flex items-center">
                            <i class="fas fa-user-circle mr-2 text-indigo-500"></i>
                            <span></span>
                        </span>
                    </div>
                    <button id="adminLogoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-lg transition-all btn flex items-center">
                        <i class="fas fa-sign-out-alt mr-2"></i> 退出登录
                    </button>
                </div>
            </div>

            <!-- 数据管理区域 -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <!-- 左侧菜单 -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-lg p-5 h-fit">
                        <h2 class="text-lg font-semibold mb-5 text-gray-800 flex items-center">
                            <i class="fas fa-layer-group mr-2 text-indigo-500"></i> 数据管理
                        </h2>
                        <ul class="space-y-3">
                            <li>
                                <button class="w-full text-left px-4 py-3 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition-all duration-200 data-table-btn nav-btn" data-table="users">
                                    <i class="fas fa-users mr-3"></i> 用户管理
                                </button>
                            </li>
                            <li>
                                <button class="w-full text-left px-4 py-3 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition-all duration-200 data-table-btn nav-btn" data-table="exams">
                                    <i class="fas fa-file-alt mr-3"></i> 考试管理
                                </button>
                            </li>
                            <li>
                                <button class="w-full text-left px-4 py-3 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition-all duration-200 data-table-btn nav-btn" data-table="scores">
                                    <i class="fas fa-chart-line mr-3"></i> 成绩管理
                                </button>
                            </li>
                        </ul>
                        
                        <!-- 系统信息 -->
                        <div class="mt-8 pt-6 border-t border-gray-200">
                            <h3 class="text-sm font-medium text-gray-600 mb-3">系统信息</h3>
                            <div class="bg-gray-50 p-3 rounded-lg">
                                <p class="text-xs text-gray-500 mb-1">当前版本</p>
                                <p class="text-sm font-medium text-gray-800">1.0.0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧数据显示 -->
                <div class="lg:col-span-3">
                    <div class="bg-white rounded-xl shadow-lg p-5">
                        <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                            <h2 id="tableTitle" class="text-xl font-semibold text-gray-800 flex items-center">
                                <i class="fas fa-list-alt mr-2 text-indigo-500"></i> 选择数据类型
                            </h2>
                            <div class="flex space-x-4">
                                <!-- 添加用户按钮，仅在users表格时显示 -->
                                <button id="addUserBtn" class="bg-green-500 hover:bg-green-600 text-white px-5 py-2.5 rounded-lg transition-colors btn hidden">
                                    <i class="fas fa-plus mr-2"></i> 添加用户
                                </button>
                                <button id="refreshBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-lg transition-colors btn">
                                    <i class="fas fa-sync-alt mr-2"></i> <span id="refreshBtnText">刷新</span>
                                    <i id="refreshLoading" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                                </button>
                            </div>
                        </div>
                        
                        <!-- 数据加载状态 -->
                        <div id="dataLoadingState" class="text-center py-16 hidden">
                            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                            <h3 class="text-lg font-medium text-gray-700 mb-2">加载中...</h3>
                            <p class="text-gray-500">正在获取数据，请稍候</p>
                        </div>

                        <!-- 数据错误状态 -->
                        <div id="dataErrorState" class="text-center py-16 hidden">
                            <div class="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="fas fa-exclamation-circle text-red-500 text-3xl"></i>
                            </div>
                            <h3 class="text-lg font-medium text-gray-700 mb-2">加载失败</h3>
                            <p class="text-gray-500 mb-4">无法获取数据，请检查网络连接</p>
                            <button id="retryDataBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-all transform hover:scale-105 btn">
                                <i class="fas fa-redo mr-2"></i> 重试
                            </button>
                        </div>

                        <!-- 数据表格 -->
                        <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
                            <table id="dataTable" class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gradient-to-r from-indigo-50 to-purple-50">
                                    <tr>
                                        <th scope="col" class="px-6 py-4 text-left text-sm font-semibold text-indigo-600 uppercase tracking-wider">ID</th>
                                        <th scope="col" class="px-6 py-4 text-left text-sm font-semibold text-indigo-600 uppercase tracking-wider">数据</th>
                                        <th scope="col" class="px-6 py-4 text-left text-sm font-semibold text-indigo-600 uppercase tracking-wider">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="dataTableBody" class="bg-white divide-y divide-gray-200">
                                    <!-- 数据行将通过JavaScript动态生成 -->
                                </tbody>
                            </table>
                        </div>

                        <!-- 空状态 -->
                        <div id="emptyState" class="text-center py-16 hidden">
                            <div class="bg-gray-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="fas fa-database text-gray-400 text-3xl"></i>
                            </div>
                            <h3 class="text-lg font-medium text-gray-700 mb-2">暂无数据</h3>
                            <p class="text-gray-500">选择左侧菜单查看数据或添加新数据</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑数据模态框 -->
    <div id="editModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50 modal backdrop-blur-sm">
        <div class="relative top-20 mx-auto p-6 border w-full max-w-lg shadow-2xl rounded-xl bg-white modal-content transform transition-all duration-300 scale-95 opacity-0">
            <div class="flex justify-between items-center mb-5 pb-3 border-b border-gray-200">
                <h3 class="text-xl font-semibold text-gray-900" id="editModalTitle">编辑数据</h3>
                <button class="text-gray-400 hover:text-gray-600 transition-colors hover:rotate-90 duration-300" id="closeEditModal">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="editForm" class="space-y-5">
                <div id="editFormFields"></div>
                <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200">
                    <button type="button" id="cancelEditBtn" class="px-5 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg transition-colors btn hover:shadow-md">取消</button>
                    <button type="submit" id="saveEditBtn" class="px-5 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors btn hover:shadow-md">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加用户模态框 -->
    <div id="addUserModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50 modal backdrop-blur-sm">
        <div class="relative top-20 mx-auto p-6 border w-full max-w-lg shadow-2xl rounded-xl bg-white modal-content transform transition-all duration-300 scale-95 opacity-0">
            <div class="flex justify-between items-center mb-5 pb-3 border-b border-gray-200">
                <h3 class="text-xl font-semibold text-gray-900">添加用户</h3>
                <button class="text-gray-400 hover:text-gray-600 transition-colors hover:rotate-90 duration-300" id="closeAddUserModal">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="addUserForm" class="space-y-5">
                <div>
                    <label for="add-username" class="block text-sm font-medium text-gray-700 mb-2 flex items-center">
                        <i class="fas fa-user mr-2 text-gray-400"></i>
                        用户名
                    </label>
                    <input type="text" id="add-username" name="username" required class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400" placeholder="请输入用户名">
                </div>
                <div>
                    <label for="add-password" class="block text-sm font-medium text-gray-700 mb-2 flex items-center">
                        <i class="fas fa-lock mr-2 text-gray-400"></i>
                        密码
                    </label>
                    <input type="password" id="add-password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400" placeholder="请输入密码">
                </div>
                <div>
                    <label for="add-school" class="block text-sm font-medium text-gray-700 mb-2 flex items-center">
                        <i class="fas fa-building mr-2 text-gray-400"></i>
                        学校
                    </label>
                    <input type="text" id="add-school" name="school" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400" placeholder="请输入学校名称">
                </div>
                <div>
                    <label for="add-class" class="block text-sm font-medium text-gray-700 mb-2 flex items-center">
                        <i class="fas fa-graduation-cap mr-2 text-gray-400"></i>
                        班级
                    </label>
                    <input type="text" id="add-class" name="class" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400" placeholder="请输入班级">
                </div>
                <div class="flex items-start">
                    <input type="checkbox" id="add-is-admin" name="isAdmin" class="mt-1 mr-2 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    <label for="add-is-admin" class="text-sm text-gray-700 flex items-center">
                        <i class="fas fa-shield-alt mr-2 text-gray-400"></i>
                        管理员权限
                    </label>
                </div>
                <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200">
                    <button type="button" id="cancelAddUserBtn" class="px-5 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg transition-colors btn hover:shadow-md">取消</button>
                    <button type="submit" id="saveAddUserBtn" class="px-5 py-2.5 bg-green-500 hover:bg-green-600 text-white rounded-lg transition-colors btn hover:shadow-md">
                        <i class="fas fa-user-plus mr-2"></i> 添加
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 全局加载指示器 -->
    <div id="globalLoading" class="hidden">
        <div class="spinner"></div>
    </div>

    <script>
        // DOMContentLoaded事件确保DOM完全加载后执行所有脚本
        document.addEventListener('DOMContentLoaded', () => {
            // 使用全局的apiService实例，api.js已创建
            // const apiService = new ApiService();

            // DOM元素
            const loginSection = document.getElementById('loginSection');
            const adminSection = document.getElementById('adminSection');
            const adminLoginForm = document.getElementById('adminLoginForm');
            const adminLoginError = document.getElementById('adminLoginError');
            const adminLoginBtn = document.getElementById('adminLoginBtn');
            const adminLogoutBtn = document.getElementById('adminLogoutBtn');
            const currentUser = document.getElementById('currentUser');
            const dataTableBtns = document.querySelectorAll('.data-table-btn');
            const dataTable = document.getElementById('dataTable');
            const dataTableBody = document.getElementById('dataTableBody');
            const tableTitle = document.getElementById('tableTitle');
            const emptyState = document.getElementById('emptyState');
            const refreshBtn = document.getElementById('refreshBtn');
            const editModal = document.getElementById('editModal');
            const closeEditModal = document.getElementById('closeEditModal');
            const cancelEditBtn = document.getElementById('cancelEditBtn');
            const editForm = document.getElementById('editForm');
            const editFormFields = document.getElementById('editFormFields');
            const editModalTitle = document.getElementById('editModalTitle');
            const saveEditBtn = document.getElementById('saveEditBtn');
            const globalLoading = document.getElementById('globalLoading');

            // 当前选中的表格
            let currentTable = '';
            // 当前编辑的数据
            let currentEditData = null;

            // 检查登录状态
            function checkAdminLoginStatus() {
                const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
                const user = JSON.parse(localStorage.getItem('user'));
                return isLoggedIn && user && user.isAdmin;
            }

            // 显示管理界面
            function showAdminSection() {
                loginSection.classList.add('hidden');
                adminSection.classList.remove('hidden');
                const user = JSON.parse(localStorage.getItem('user'));
                currentUser.textContent = `当前用户: ${user.username}`;
                
                // 隐藏全局加载指示器
                if (globalLoading) {
                    globalLoading.classList.add('hidden');
                }
            }

            // 显示登录界面
            function showLoginSection() {
                adminSection.classList.add('hidden');
                loginSection.classList.remove('hidden');
                adminLoginForm.reset();
                adminLoginError.classList.add('hidden');
                
                // 隐藏全局加载指示器
                if (globalLoading) {
                    globalLoading.classList.add('hidden');
                }
            }

            // 加载数据
            async function loadData(table) {
                // 显示加载状态
                showLoadingState(true);
                
                try {
                    const result = await apiService.getData(table);
                    if (result && result.data) {
                        renderDataTable(table, result.data);
                    } else {
                        renderEmptyState();
                    }
                } catch (error) {
                    console.error('加载数据失败:', error);
                    renderEmptyState();
                } finally {
                    // 隐藏加载状态
                    showLoadingState(false);
                }
            }

            // 显示/隐藏加载状态
            function showLoadingState(show) {
                const refreshBtnText = document.getElementById('refreshBtnText');
                const refreshLoading = document.getElementById('refreshLoading');
                const tableBtns = document.querySelectorAll('.data-table-btn');
                
                if (show) {
                    refreshBtnText.textContent = '加载中';
                    refreshLoading.classList.remove('hidden');
                    // 禁用所有数据表格按钮
                    tableBtns.forEach(btn => {
                        btn.disabled = true;
                        btn.classList.add('opacity-50', 'cursor-not-allowed');
                    });
                } else {
                    refreshBtnText.textContent = '刷新';
                    refreshLoading.classList.add('hidden');
                    // 启用所有数据表格按钮
                    tableBtns.forEach(btn => {
                        btn.disabled = false;
                        btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    });
                }
            }

            // 渲染数据表格
            function renderDataTable(table, data) {
                currentTable = table;
                tableTitle.textContent = `${table.charAt(0).toUpperCase() + table.slice(1)} 管理`;
                
                // 显示/隐藏添加用户按钮
                const addUserBtn = document.getElementById('addUserBtn');
                if (table === 'users') {
                    addUserBtn.classList.remove('hidden');
                } else {
                    addUserBtn.classList.add('hidden');
                }
                
                // 清空表格
                dataTableBody.innerHTML = '';
                
                if (data.length === 0) {
                    renderEmptyState();
                    return;
                }
                
                emptyState.classList.add('hidden');
                dataTable.classList.remove('hidden');
                
                // 生成表头
                const headers = Object.keys(data[0]);
                const thead = dataTable.querySelector('thead tr');
                thead.innerHTML = headers.map(header => `<th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">${header}</th>`).join('') + 
                              '<th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>';
                
                // 生成表格行
                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = headers.map(header => `<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${item[header]}</td>`).join('') + 
                               `<td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                   <button class="text-blue-600 hover:text-blue-900 mr-3 edit-btn" data-id="${item.id}">
                                       <i class="fas fa-edit"></i> 编辑
                                   </button>
                                   <button class="text-red-600 hover:text-red-900 delete-btn" data-id="${item.id}">
                                       <i class="fas fa-trash"></i> 删除
                                   </button>
                               </td>`;
                    dataTableBody.appendChild(row);
                });
                
                // 绑定事件
                bindTableEvents();
            }

            // 渲染空状态
            function renderEmptyState() {
                dataTable.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }

            // 绑定表格事件
            function bindTableEvents() {
                // 编辑按钮事件
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const id = this.getAttribute('data-id');
                        // 获取当前行数据
                        const row = this.closest('tr');
                        const cells = row.querySelectorAll('td');
                        const headers = Array.from(dataTable.querySelectorAll('thead th')).map(th => th.textContent.toLowerCase());
                        
                        // 构建数据对象
                        const data = {};
                        headers.forEach((header, index) => {
                            if (header !== '操作') {
                                data[header] = cells[index].textContent;
                            }
                        });
                        
                        // 打开编辑模态框
                        openEditModal(currentTable, data);
                    });
                });
                
                // 删除按钮事件
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const id = this.getAttribute('data-id');
                        const originalContent = this.innerHTML;
                        
                        if (confirm(`确定要删除ID为 ${id} 的数据吗？`)) {
                            // 显示加载状态
                            this.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> 删除中...';
                            this.disabled = true;
                            this.classList.add('opacity-50');
                            
                            try {
                                await apiService.deleteData(currentTable, id);
                                alert('删除成功');
                                // 刷新数据
                                loadData(currentTable);
                            } catch (error) {
                                console.error('删除数据失败:', error);
                                alert('删除失败');
                            } finally {
                                // 恢复原始状态
                                this.innerHTML = originalContent;
                                this.disabled = false;
                                this.classList.remove('opacity-50');
                            }
                        }
                    });
                });
            }

            // 打开编辑模态框
            function openEditModal(table, data) {
                currentEditData = data;
                editModalTitle.textContent = `编辑${table}数据`;
                
                // 清空表单字段
                editFormFields.innerHTML = '';
                
                // 生成表单字段
                for (const [key, value] of Object.entries(data)) {
                    // 跳过id字段，不允许编辑
                    if (key !== 'id') {
                        const fieldGroup = document.createElement('div');
                        fieldGroup.className = 'space-y-1';
                        
                        const label = document.createElement('label');
                        label.className = 'block text-sm font-medium text-gray-700';
                        label.textContent = key;
                        label.setAttribute('for', `edit-${key}`);
                        
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.id = `edit-${key}`;
                        input.name = key;
                        input.value = value;
                        input.className = 'w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent';
                        
                        fieldGroup.appendChild(label);
                        fieldGroup.appendChild(input);
                        editFormFields.appendChild(fieldGroup);
                    }
                }
                
                // 显示模态框
                showModal('editModal');
            }

            // 关闭编辑模态框
            function closeEditModalFunc() {
                hideModal('editModal');
                currentEditData = null;
            }

            // 保存编辑的数据
            async function saveEditData() {
                if (!currentEditData || !currentTable) return;
                
                // 获取表单数据
                const formData = new FormData(editForm);
                const updatedData = {};
                
                for (const [key, value] of formData.entries()) {
                    updatedData[key] = value;
                }
                
                // 显示加载状态
                saveEditBtn.disabled = true;
                saveEditBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> 保存中...';
                
                try {
                    // 调用API更新数据
                    await apiService.putData(currentTable, currentEditData.id, updatedData);
                    alert('保存成功');
                    
                    // 关闭模态框
                    closeEditModalFunc();
                    
                    // 刷新数据
                    loadData(currentTable);
                } catch (error) {
                    console.error('更新数据失败:', error);
                    alert('保存失败');
                } finally {
                    // 恢复原始状态
                    saveEditBtn.disabled = false;
                    saveEditBtn.innerHTML = '保存';
                }
            }

            // 登录表单提交事件
            adminLoginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('adminUsername').value;
                const password = document.getElementById('adminPassword').value;
                
                adminLoginError.classList.add('hidden');
                adminLoginBtn.disabled = true;
                adminLoginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>登录中...';
                
                try {
                    // 调用登录API
                    const result = await apiService.login(username, password);
                    
                    if (result && result.success) {
                        // 保存用户信息到本地存储
                        Storage.saveUser(result.user);
                        Storage.setLoggedIn(true);
                        
                        // 检查用户是否为管理员
                        if (result.user.isAdmin) {
                            // 跳转到管理界面
                            showAdminSection();
                        } else {
                            // 不是管理员用户，清除登录状态
                            Storage.setLoggedIn(false);
                            Storage.saveUser(null);
                            adminLoginError.textContent = '权限不足，只有管理员才能登录';
                            adminLoginError.classList.remove('hidden');
                        }
                    } else {
                        adminLoginError.textContent = result?.message || '登录失败，请检查用户名和密码';
                        adminLoginError.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error('登录错误:', error);
                    adminLoginError.textContent = '登录失败，请检查网络连接';
                    adminLoginError.classList.remove('hidden');
                } finally {
                    adminLoginBtn.disabled = false;
                    adminLoginBtn.innerHTML = '登录';
                }
            });

            // 登出按钮事件
            adminLogoutBtn.addEventListener('click', () => {
                Storage.setLoggedIn(false);
                Storage.saveUser(null);
                showLoginSection();
            });

            // 数据表格按钮事件
            dataTableBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const table = btn.getAttribute('data-table');
                    loadData(table);
                });
            });

            // 刷新按钮事件
            refreshBtn.addEventListener('click', () => {
                if (currentTable) {
                    loadData(currentTable);
                }
            });

            // 编辑模态框关闭事件
            closeEditModal.addEventListener('click', closeEditModalFunc);
            cancelEditBtn.addEventListener('click', closeEditModalFunc);

            // 点击模态框外部关闭
            window.addEventListener('click', (e) => {
                if (e.target === editModal) {
                    closeEditModalFunc();
                }
            });

            // 打开添加用户模态框
            function openAddUserModal() {
                showModal('addUserModal');
            }

            // 关闭添加用户模态框
            function closeAddUserModalFunc() {
                hideModal('addUserModal');
                // 清空表单
                document.getElementById('addUserForm').reset();
            }

            // 保存添加的用户
            async function saveAddUser() {
                const addUserForm = document.getElementById('addUserForm');
                const saveAddUserBtn = document.getElementById('saveAddUserBtn');
                const originalContent = saveAddUserBtn.innerHTML;
                
                // 获取表单数据
                const formData = new FormData(addUserForm);
                const userData = {
                    username: formData.get('username'),
                    password: formData.get('password'),
                    school: formData.get('school'),
                    class: formData.get('class')
                };
                
                // 显示加载状态
                saveAddUserBtn.disabled = true;
                saveAddUserBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> 保存中...';
                
                try {
                    // 调用API添加用户
                    const result = await apiService.addUser(userData);
                    
                    if (result.success) {
                        alert('用户添加成功');
                        closeAddUserModalFunc();
                        // 刷新用户列表
                        loadData('users');
                    } else {
                        alert(result.message || '用户添加失败');
                    }
                } catch (error) {
                    console.error('添加用户失败:', error);
                    alert('用户添加失败，请检查网络连接或重试');
                } finally {
                    // 恢复原始状态
                    saveAddUserBtn.disabled = false;
                    saveAddUserBtn.innerHTML = originalContent;
                }
            }

            // 添加用户按钮事件
            document.getElementById('addUserBtn').addEventListener('click', openAddUserModal);

            // 添加用户模态框关闭事件
            document.getElementById('closeAddUserModal').addEventListener('click', closeAddUserModalFunc);
            document.getElementById('cancelAddUserBtn').addEventListener('click', closeAddUserModalFunc);

            // 点击添加用户模态框外部关闭
            window.addEventListener('click', (e) => {
                if (e.target === document.getElementById('addUserModal')) {
                    closeAddUserModalFunc();
                }
            });

            // 添加用户表单提交事件
            document.getElementById('addUserForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveAddUser();
            });

            // 编辑表单提交事件
            editForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveEditData();
            });

            // 页面加载时立即显示全局加载指示器
            if (globalLoading) {
                globalLoading.classList.remove('hidden');
            }

            // 页面加载时检查登录状态
            if (checkAdminLoginStatus()) {
                showAdminSection();
            } else {
                showLoginSection();
            }
        });
    </script>
</body>
</html>
