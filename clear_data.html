<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除示例数据</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
            color: #374151;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 20px;
        }
        p {
            color: #6b7280;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #dc2626;
        }
        .note {
            margin-top: 20px;
            font-size: 14px;
            color: #9ca3af;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>清除示例数据</h1>
        <p>点击下方按钮将清除系统中的所有示例数据，包括考试记录、个人资料和目标设置。</p>
        <button id="clearBtn" class="btn">清除所有示例数据</button>
        <div class="note">注意：此操作不可逆，请确保您确实需要清除所有数据。</div>
    </div>

    <script>
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('确定要清除所有示例数据吗？此操作不可逆。')) {
                // 清除localStorage中的考试数据
                localStorage.removeItem('exams');
                localStorage.removeItem('gradeSystemExams');
                localStorage.removeItem('profile');
                localStorage.removeItem('goals');
                
                // 显示清除成功的消息
                const message = document.createElement('div');
                message.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: #10b981;
                    color: white;
                    padding: 20px;
                    border-radius: 8px;
                    font-size: 16px;
                    z-index: 9999;
                    text-align: center;
                    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                `;
                message.textContent = '示例数据已清除！页面将在3秒后刷新。';
                document.body.appendChild(message);
                
                // 3秒后关闭消息并刷新页面
                setTimeout(() => {
                    message.remove();
                    alert('数据已成功清除，您可以返回主页面开始使用干净的系统。');
                }, 3000);
            }
        });
    </script>
</body>
</html>
