<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皓之羽</title>
    <link rel="icon" type="image/png" href="/imgs/logo.png">
    <!-- 引入Google Fonts：思源宋体和思源黑体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 皓之羽品牌色彩系统 - 浅色模式 */
            --primary: #7FB3D5;      /* 羽蓝 - 主色调 */
            --primary-light: #85C1E2; /* 羽青 - 辅助主色调 */
            --secondary: #5B9DC7;    /* 深羽蓝 - 次级色调 */
            --success: #A3E4D7;      /* 羽绿 - 成功色 */
            --light: #F5F7FA;        /* 轻羽灰 - 浅色背景 */
            --dark: #34495E;         /* 深灰 - 正文文本 */
            --gray: #7F8C8D;         /* 中灰 - 次要文本 */
            --background: linear-gradient(135deg, #f5f7ff 0%, #e9ecef 100%);
            --card-bg: white;
            --tab-bg: var(--light);
            --border-color: #e1e5ee;
            --border-radius: 16px;   /* 圆角，更柔和 */
            --shadow: 0 8px 24px rgba(0,0,0,0.08); /* 更轻盈的阴影 */
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* 更自然的过渡 */
        }

        /* 深色模式变量 */
        body.dark-mode {
            --primary: #85C1E2;      /* 羽青 - 主色调 */
            --primary-light: #7FB3D5; /* 羽蓝 - 辅助主色调 */
            --secondary: #85C1E2;    /* 羽青 - 次级色调 */
            --success: #A3E4D7;      /* 羽绿 - 成功色 */
            --light: #2C3E50;        /* 深色背景 */
            --dark: #ECF0F1;         /* 浅色文本 */
            --gray: #BDC3C7;         /* 中灰 - 次要文本 */
            --background: linear-gradient(135deg, #1A202C 0%, #2D3748 100%);
            --card-bg: #2D3748;
            --tab-bg: #2C3E50;
            --border-color: #4A5568;
            --shadow: 0 8px 24px rgba(0,0,0,0.2); /* 更深的阴影 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--background);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            transition: var(--transition);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 0;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
        }

        /* 深色模式切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: none;
            color: var(--dark);
            font-size: 20px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        .theme-toggle:hover {
            background-color: var(--light);
            transform: scale(1.1);
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
            animation: grow 0.6s ease 0.3s forwards;
            transform: translateX(-50%) scaleX(0);
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            font-family: 'Noto Serif SC', serif;
            animation: fadeInDown 0.6s ease forwards;
        }

        header p {
            font-size: 1.2rem;
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease 0.2s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Logo样式 */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease forwards;
        }
        
        .logo {
            max-height: 140px;
            max-width: 100%;
            object-fit: contain;
        }
        
        /* 博客链接样式 */
        .blog-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            text-decoration: none;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        
        .blog-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(127, 179, 213, 0.2);
        }

        .blog-link:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(67, 97, 238, 0.2);
        }

        .tabs-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease 0.4s forwards;
        }

        .tabs {
            display: flex;
            background: var(--tab-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .tab-button {
            flex: 1;
            background: none;
            border: none;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-button:hover {
            color: var(--primary);
            background: rgba(67, 97, 238, 0.05);
        }

        .tab-button.active {
            color: var(--primary);
            background: var(--card-bg);
        }

        .tab-button.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
        }

        .tab-content {
            display: none;
            padding: 30px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: 1px solid var(--border-color);
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        /* 为项目卡片添加交错动画 */
        .project-card:nth-child(1) { animation-delay: 0.5s; }
        .project-card:nth-child(2) { animation-delay: 0.6s; }
        .project-card:nth-child(3) { animation-delay: 0.7s; }
        .project-card:nth-child(4) { animation-delay: 0.8s; }
        .project-card:nth-child(5) { animation-delay: 0.9s; }
        .project-card:nth-child(6) { animation-delay: 1s; }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: var(--primary);
            transition: var(--transition);
        }

        .project-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 24px 56px rgba(127, 179, 213, 0.15);
            border-color: rgba(127, 179, 213, 0.3);
        }

        .project-card:hover::before {
            width: 10px;
            background: var(--success);
        }

        /* 添加项目卡片内部元素动画 */
        .project-card:hover .card-content {
            transform: translateY(-5px);
            transition: transform 0.3s ease;
        }

        .project-card:hover .card-tags {
            opacity: 1;
            transform: translateY(0);
        }

        .card-icon {
            height: 140px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .card-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(30deg);
            transition: var(--transition);
        }

        .project-card:hover .card-icon::after {
            transform: rotate(30deg) translate(20px, 20px);
        }

        .card-content {
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .card-content h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: var(--dark);
        }

        .card-content p {
            color: var(--gray);
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            opacity: 0.8;
            transform: translateY(5px);
            transition: all 0.3s ease;
        }

        .tag {
            background-color: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .tag:hover {
            background-color: var(--primary);
            color: white;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .card-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }

        .card-link:hover {
            color: var(--success);
            gap: 8px;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--gray);
        }

        .no-projects {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .no-projects svg {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            color: #dee2e6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(67, 97, 238, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        /* 新增动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes grow {
            from {
                transform: translateX(-50%) scaleX(0);
            }
            to {
                transform: translateX(-50%) scaleX(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px 20px;
            color: var(--gray);
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease 1s forwards;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        footer a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-links a {
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            header h1 {
                font-size: 2.2rem;
            }

            .tab-button {
                padding: 14px 16px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-button {
                justify-content: flex-start;
                padding: 12px 20px;
            }

            .tab-content {
                padding: 20px;
            }
        }
        
        /* SVG图标样式 */
        .icon {
            width: 1em;
            height: 1em;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
        <div class="logo-container">
            <img src="imgs/logo_text.png" alt="皓之羽" class="logo">
        </div>
        <p>欢迎来到我的个人项目集合</p>
    </header>

    <!-- 深色模式切换按钮 -->
    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </button>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-button active" data-tab="public">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                    公共项目
                </button>
                <button class="tab-button" data-tab="personal">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    我的项目
                </button>
            </div>

            <div class="tab-content active" id="public-tab">
                <div class="projects-grid" id="public-projects">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载公共项目...</p>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="personal-tab">
                <div class="projects-grid" id="personal-projects">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载我的项目...</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div class="footer-content">
                <p>© 2025 项目导航中心 | Quilluna</p>
                <div class="footer-links">
                    <a href="https://blog.bo173.dpdns.org" target="_blank" class="blog-link">欢迎访问我的博客</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- SVG图标定义 -->
    <svg style="display: none;">
        <symbol id="globe-icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </symbol>
        <symbol id="user-icon" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </symbol>
        <symbol id="code-icon" viewBox="0 0 24 24">
            <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
        </symbol>
        <symbol id="dashboard-icon" viewBox="0 0 24 24">
            <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </symbol>
        <symbol id="chart-icon" viewBox="0 0 24 24">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
        </symbol>
        <symbol id="inbox-icon" viewBox="0 0 24 24">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5v-3h3.56c.69 1.19 1.97 2 3.45 2s2.75-.81 3.45-2H19v3zm0-5h-4.99c0 1.1-.9 2-2 2s-2-.9-2-2H5V5h14v9z"/>
        </symbol>
        <symbol id="music-icon" viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </symbol>
        <symbol id="arrow-right-icon" viewBox="0 0 24 24">
            <path d="M10 17l5-5-5-5v10z"/>
        </symbol>
    </svg>



    <script>
        const projectsData = {
  "public":[
  {
    "date": "2025-10-25",
    "description": "搜索引擎",
    "icon": "globe-icon",
    "id": 1,
    "link": "https://cn.bing.com",
    "name": "必应",
    "tags": []
  }],
  "personal":[
  {
    "date": "2025-10-25",
    "description": "成绩统计与分析系统",
    "icon": "chart-icon",
    "id": 1,
    "link": "grade",
    "name": "皓羽成绩分析",
    "tags": []
  },
  {
    "date": "2025-12-14",
    "description": "音乐播放器，支持本地音乐播放和管理",
    "icon": "music-icon",
    "id": 2,
    "link": "music_player",
    "name": "皓羽音乐播放器",
    "tags": []
  }]
};

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 渲染项目卡片
            renderProjects('public', projectsData.public);
            renderProjects('personal', projectsData.personal);

            // 标签页切换功能
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');

            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.getAttribute('data-tab');

                    // 更新活动标签按钮
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    // 显示对应标签内容
                    tabContents.forEach(content => {
                        content.classList.remove('active');
                        if (content.id === `${tabId}-tab`) {
                            // 添加短暂延迟使动画更平滑
                            setTimeout(() => {
                                content.classList.add('active');
                            }, 50);
                        }
                    });
                });
            });
        });

        // 渲染项目卡片函数
        function renderProjects(type, projects) {
            const container = document.getElementById(`${type}-projects`);

            if (!projects || projects.length === 0) {
                container.innerHTML = `
                    <div class="no-projects">
                        <svg class="icon" viewBox="0 0 24 24">
                            <use xlink:href="#inbox-icon"></use>
                        </svg>
                        <h3>暂无项目</h3>
                        <p>当前没有${type === 'public' ? '公共' : '个人'}项目可显示</p>
                    </div>
                `;
                return;
            }

            let html = '';
            projects.forEach(project => {
                html += `
                    <div class="project-card" onclick="window.location.href='${project.link}'">
                        <div class="card-icon">
                            <svg class="icon" viewBox="0 0 24 24">
                                <use xlink:href="#${project.icon}"></use>
                            </svg>
                        </div>
                        <div class="card-content">
                            <h3>${project.name}</h3>
                            <p>${project.description}</p>
                            <div class="card-tags">
                                ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                            <div class="card-footer">
                                <a href="${project.link}" class="card-link">
                                    访问项目 
                                    <svg class="icon" viewBox="0 0 24 24">
                                        <use xlink:href="#arrow-right-icon"></use>
                                    </svg>
                                </a>
                                <span class="card-date">${project.date}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
    
  <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/script.js"></script>
    <script>
        // 深色模式切换逻辑
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // 检查本地存储中的主题设置
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }

        // 点击切换主题
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
        });



    </script>
</body>
