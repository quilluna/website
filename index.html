<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目导航中心</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --border-radius: 12px;
            --shadow: 0 10px 20px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7ff 0%, #e9ecef 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        header p {
            font-size: 1.2rem;
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto;
        }

        .tabs-container {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            background: var(--light);
            border-bottom: 1px solid #e1e5ee;
        }

        .tab-button {
            flex: 1;
            background: none;
            border: none;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-button:hover {
            color: var(--primary);
            background: rgba(67, 97, 238, 0.05);
        }

        .tab-button.active {
            color: var(--primary);
            background: white;
        }

        .tab-button.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
        }

        .tab-content {
            display: none;
            padding: 30px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid #eef2ff;
            position: relative;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: var(--primary);
            transition: var(--transition);
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .project-card:hover::before {
            width: 8px;
            background: var(--success);
        }

        .card-icon {
            height: 140px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .card-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(30deg);
            transition: var(--transition);
        }

        .project-card:hover .card-icon::after {
            transform: rotate(30deg) translate(20px, 20px);
        }

        .card-content {
            padding: 20px;
        }

        .card-content h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: var(--dark);
        }

        .card-content p {
            color: var(--gray);
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            background-color: #eef2ff;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .tag:hover {
            background-color: var(--primary);
            color: white;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f1f3f9;
        }

        .card-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }

        .card-link:hover {
            color: var(--success);
            gap: 8px;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--gray);
        }

        .no-projects {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .no-projects svg {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            color: #dee2e6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(67, 97, 238, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            header h1 {
                font-size: 2.2rem;
            }

            .tab-button {
                padding: 14px 16px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-button {
                justify-content: flex-start;
                padding: 12px 20px;
            }

            .tab-content {
                padding: 20px;
            }
        }
        
        /* SVG图标样式 */
        .icon {
            width: 1em;
            height: 1em;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>项目导航中心</h1>
            <p>快速访问和管理您的项目资源</p>
        </header>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-button active" data-tab="public">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                    公共项目
                </button>
                <button class="tab-button" data-tab="personal">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    我的项目
                </button>
            </div>

            <div class="tab-content active" id="public-tab">
                <div class="projects-grid" id="public-projects">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载公共项目...</p>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="personal-tab">
                <div class="projects-grid" id="personal-projects">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载我的项目...</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2025 项目导航中心 | Quilluna</p>
        </footer>
    </div>

    <!-- SVG图标定义 -->
    <svg style="display: none;">
        <symbol id="globe-icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </symbol>
        <symbol id="user-icon" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </symbol>
        <symbol id="code-icon" viewBox="0 0 24 24">
            <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
        </symbol>
        <symbol id="dashboard-icon" viewBox="0 0 24 24">
            <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </symbol>
        <symbol id="chart-icon" viewBox="0 0 24 24">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
        </symbol>
        <symbol id="inbox-icon" viewBox="0 0 24 24">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5v-3h3.56c.69 1.19 1.97 2 3.45 2s2.75-.81 3.45-2H19v3zm0-5h-4.99c0 1.1-.9 2-2 2s-2-.9-2-2H5V5h14v9z"/>
        </symbol>
        <symbol id="arrow-right-icon" viewBox="0 0 24 24">
            <path d="M10 17l5-5-5-5v10z"/>
        </symbol>
    </svg>

    <script>
        const projectsData = {
  "public":[
  {
    "date": "2025-10-25",
    "description": "搜索引擎",
    "icon": "globe-icon",
    "id": 1,
    "link": "https://cn.bing.com",
    "name": "必应",
    "tags": []
  }],
  "personal":[
  {
    "date": "2025-10-25",
    "description": "成绩统计与分析系统",
    "icon": "chart-icon",
    "id": 1,
    "link": "grade",
    "name": "成绩统计",
    "tags": []
  }]
};

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 渲染项目卡片
            renderProjects('public', projectsData.public);
            renderProjects('personal', projectsData.personal);

            // 标签页切换功能
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');

            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.getAttribute('data-tab');

                    // 更新活动标签按钮
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    // 显示对应标签内容
                    tabContents.forEach(content => {
                        content.classList.remove('active');
                        if (content.id === `${tabId}-tab`) {
                            // 添加短暂延迟使动画更平滑
                            setTimeout(() => {
                                content.classList.add('active');
                            }, 50);
                        }
                    });
                });
            });
        });

        // 渲染项目卡片函数
        function renderProjects(type, projects) {
            const container = document.getElementById(`${type}-projects`);

            if (!projects || projects.length === 0) {
                container.innerHTML = `
                    <div class="no-projects">
                        <svg class="icon" viewBox="0 0 24 24">
                            <use xlink:href="#inbox-icon"></use>
                        </svg>
                        <h3>暂无项目</h3>
                        <p>当前没有${type === 'public' ? '公共' : '个人'}项目可显示</p>
                    </div>
                `;
                return;
            }

            let html = '';
            projects.forEach(project => {
                html += `
                    <div class="project-card" onclick="window.location.href='${project.link}'">
                        <div class="card-icon">
                            <svg class="icon" viewBox="0 0 24 24">
                                <use xlink:href="#${project.icon}"></use>
                            </svg>
                        </div>
                        <div class="card-content">
                            <h3>${project.name}</h3>
                            <p>${project.description}</p>
                            <div class="card-tags">
                                ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                            <div class="card-footer">
                                <a href="${project.link}" class="card-link">
                                    访问项目 
                                    <svg class="icon" viewBox="0 0 24 24">
                                        <use xlink:href="#arrow-right-icon"></use>
                                    </svg>
                                </a>
                                <span class="card-date">${project.date}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
    
    <!-- 引入必要的 JavaScript 文件 -->
    <script src="js/api.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
