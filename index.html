<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目导航中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --border-radius: 12px;
            --shadow: 0 10px 20px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7ff 0%, #e9ecef 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        header p {
            font-size: 1.2rem;
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto;
        }

        .tabs-container {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            background: var(--light);
            border-bottom: 1px solid #e1e5ee;
        }

        .tab-button {
            flex: 1;
            background: none;
            border: none;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-button:hover {
            color: var(--primary);
            background: rgba(67, 97, 238, 0.05);
        }

        .tab-button.active {
            color: var(--primary);
            background: white;
        }

        .tab-button.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
        }

        .tab-content {
            display: none;
            padding: 30px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid #eef2ff;
            position: relative;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: var(--primary);
            transition: var(--transition);
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .project-card:hover::before {
            width: 8px;
            background: var(--success);
        }

        .card-icon {
            height: 140px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .card-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(30deg);
            transition: var(--transition);
        }

        .project-card:hover .card-icon::after {
            transform: rotate(30deg) translate(20px, 20px);
        }

        .card-content {
            padding: 20px;
        }

        .card-content h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: var(--dark);
        }

        .card-content p {
            color: var(--gray);
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            background-color: #eef2ff;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .tag:hover {
            background-color: var(--primary);
            color: white;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f1f3f9;
        }

        .card-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }

        .card-link:hover {
            color: var(--success);
            gap: 8px;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--gray);
        }

        .no-projects {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .no-projects i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #dee2e6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(67, 97, 238, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            header h1 {
                font-size: 2.2rem;
            }

            .tab-button {
                padding: 14px 16px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-button {
                justify-content: flex-start;
                padding: 12px 20px;
            }

            .tab-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>项目导航中心</h1>
            <p>快速访问和管理您的项目资源，提高工作效率</p>
        </header>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-button active" data-tab="public">
                    <i class="fas fa-globe"></i>
                    公共项目
                </button>
                <button class="tab-button" data-tab="personal">
                    <i class="fas fa-user"></i>
                    我的项目
                </button>
            </div>

            <div class="tab-content active" id="public-tab">
                <div class="projects-grid" id="public-projects">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载公共项目...</p>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="personal-tab">
                <div class="projects-grid" id="personal-projects">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载我的项目...</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2023 项目导航中心 | 动态配置，高效工作</p>
        </footer>
    </div>

    <script>
        // 加载外部JSON数据
        async function loadProjectsData() {
            try {
                // 在实际应用中，这里应该是您的JSON文件路径
                // 为了演示，我们使用一个模拟的URL，实际使用时请替换为真实路径
                const response = await fetch('projects-data.json');
                if (!response.ok) {
                    throw new Error('网络响应不正常');
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('加载项目数据时出错:', error);
                // 如果加载失败，使用默认数据
                return getDefaultData();
            }
        }

        // 默认数据（在无法加载外部JSON时使用）
        function getDefaultData() {
            return {
                "public": [
                    {
                        "id": 1,
                        "name": "设计资源库",
                        "description": "汇集优秀设计资源和模板，提升设计效率",
                        "icon": "fas fa-palette",
                        "link": "#",
                        "tags": ["设计", "资源", "模板"],
                        "date": "2023-10-15"
                    },
                    {
                        "id": 2,
                        "name": "开发文档中心",
                        "description": "前端、后端开发技术文档和最佳实践指南",
                        "icon": "fas fa-book",
                        "link": "#",
                        "tags": ["文档", "开发", "技术"],
                        "date": "2023-09-28"
                    },
                    {
                        "id": 3,
                        "name": "团队协作平台",
                        "description": "提高团队协作效率的在线工具集合",
                        "icon": "fas fa-users",
                        "link": "#",
                        "tags": ["协作", "工具", "团队"],
                        "date": "2023-11-05"
                    },
                    {
                        "id": 4,
                        "name": "开源项目集",
                        "description": "公司内部开源项目展示和贡献指南",
                        "icon": "fas fa-code-branch",
                        "link": "#",
                        "tags": ["开源", "代码", "贡献"],
                        "date": "2023-08-12"
                    }
                ],
                "personal": [
                    {
                        "id": 1,
                        "name": "个人工作台",
                        "description": "个性化工作空间，快速访问常用工具和资源",
                        "icon": "fas fa-desktop",
                        "link": "#",
                        "tags": ["工作", "个人", "工具"],
                        "date": "2023-11-20"
                    },
                    {
                        "id": 2,
                        "name": "项目进度追踪",
                        "description": "跟踪个人项目的进度和任务状态",
                        "icon": "fas fa-tasks",
                        "link": "#",
                        "tags": ["进度", "任务", "跟踪"],
                        "date": "2023-10-30"
                    },
                    {
                        "id": 3,
                        "name": "学习笔记库",
                        "description": "个人学习笔记和技术总结归档",
                        "icon": "fas fa-sticky-note",
                        "link": "#",
                        "tags": ["学习", "笔记", "技术"],
                        "date": "2023-11-15"
                    }
                ]
            };
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', async function() {
            // 加载项目数据
            const projectsData = await loadProjectsData();

            // 渲染项目卡片
            renderProjects('public', projectsData.public);
            renderProjects('personal', projectsData.personal);

            // 标签页切换功能
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');

            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.getAttribute('data-tab');

                    // 更新活动标签按钮
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    // 显示对应标签内容
                    tabContents.forEach(content => {
                        content.classList.remove('active');
                        if (content.id === `${tabId}-tab`) {
                            // 添加短暂延迟使动画更平滑
                            setTimeout(() => {
                                content.classList.add('active');
                            }, 50);
                        }
                    });
                });
            });
        });

        // 渲染项目卡片函数
        function renderProjects(type, projects) {
            const container = document.getElementById(`${type}-projects`);

            if (!projects || projects.length === 0) {
                container.innerHTML = `
                    <div class="no-projects">
                        <i class="fas fa-inbox"></i>
                        <h3>暂无项目</h3>
                        <p>当前没有${type === 'public' ? '公共' : '个人'}项目可显示</p>
                    </div>
                `;
                return;
            }

            let html = '';
            projects.forEach(project => {
                html += `
                    <div class="project-card" onclick="window.location.href='${project.link}'">
                        <div class="card-icon">
                            <i class="${project.icon}"></i>
                        </div>
                        <div class="card-content">
                            <h3>${project.name}</h3>
                            <p>${project.description}</p>
                            <div class="card-tags">
                                ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                            <div class="card-footer">
                                <a href="${project.link}" class="card-link">
                                    访问项目 <i class="fas fa-arrow-right"></i>
                                </a>
                                <span class="card-date">${project.date}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
